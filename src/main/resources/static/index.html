<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>중고차 매물 관리 시스템</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1, h2 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: inline-block; width: 100px; font-weight: bold; }
        .form-group input { padding: 6px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 6px 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f4f4f4; }
        .btn-delete { background-color: #dc3545; }
        .btn-delete:hover { background-color: #bd2130; }
    </style>
</head>
<body>

    <h1>중고차 매물 관리 시스템</h1>

    <h2>1. 신규 매물 등록</h2>
    <div class="form-group">
        <label for="modelName">모델명:</label>
        <input type="text" id="modelName" placeholder="예: 아반떼 CN7">
    </div>
    <div class="form-group">
        <label for="mileage">주행거리(km):</label>
        <input type="number" id="mileage" placeholder="예: 45000">
    </div>
    <div class="form-group">
        <label for="price">가격(만원):</label>
        <input type="number" id="price" placeholder="예: 1850">
    </div>
    <button onclick="createCar()">매물 등록하기</button>

    <h2>2. 등록된 매물 목록</h2>
    <button onclick="loadCars()" style="background-color: #28a745;">새로고침 / 목록 불러오기</button>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>모델명</th>
                <th>주행거리 (km)</th>
                <th>가격 (만원)</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody id="carTableBody">
            </tbody>
    </table>

    <script>
        const API_URL = '/api/cars';

        // 페이지가 로드되면 자동으로 목록을 불러옵니다.
        window.onload = function() {
            loadCars();
        };

        // [조회] 서버에서 전체 자동차 목록을 가져와서 테이블에 그려주는 함수
        function loadCars() {
            fetch(API_URL)
                .then(response => response.json())
                .then(cars => {
                    const tbody = document.getElementById('carTableBody');
                    tbody.innerHTML = ''; // 기존 목록 초기화

                    if (cars.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5">등록된 매물이 없습니다.</td></tr>';
                        return;
                    }

                    cars.forEach(car => {
                        const row = `
                            <tr>
                                <td>${car.id}</td>
                                <td>${car.modelName}</td>
                                <td>${car.mileage.toLocaleString()} km</td>
                                <td>${car.price.toLocaleString()} 만원</td>
                                <td>
                                    <button class="btn-delete" onclick="deleteCar(${car.id})">삭제</button>
                                </td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                })
                .catch(error => console.error('Error:', error));
        }

        // [등록] 사용자가 입력한 데이터를 JSON으로 만들어 서버로 전송하는 함수
        function createCar() {
            const modelName = document.getElementById('modelName').value;
            const mileage = document.getElementById('mileage').value;
            const price = document.getElementById('price').value;

            if (!modelName || !mileage || !price) {
                alert('모든 필드를 입력해주세요!');
                return;
            }

            const carData = {
                modelName: modelName,
                mileage: parseInt(mileage),
                price: parseInt(price)
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(carData)
            })
            .then(response => response.json())
            .then(data => {
                alert('매물이 성공적으로 등록되었습니다!');
                // 입력창 비우기
                document.getElementById('modelName').value = '';
                document.getElementById('mileage').value = '';
                document.getElementById('price').value = '';
                // 목록 다시 새로고침
                loadCars();
            })
            .catch(error => console.error('Error:', error));
        }

        // [삭제] ID 기반으로 매물을 서버에서 삭제하는 함수
        function deleteCar(id) {
            if (!confirm(id + '번 매물을 정말 삭제하시겠습니까?')) return;

            fetch(`${API_URL}/${id}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (response.ok) {
                    alert('성공적으로 삭제되었습니다.');
                    loadCars(); // 목록 다시 새로고침
                } else {
                    alert('삭제에 실패했습니다.');
                }
            })
            .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
